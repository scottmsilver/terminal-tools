; Polybar config for i3wm + CRD
; Dracula theme. Font size and bar height are updated by set_dpi.sh.
;
; Install: symlink ~/.config/polybar/ to this directory
; Requires: polybar 3.7+, i3wm, Noto Sans font

[colors]
background = #282a36
foreground = #f8f8f2
primary = #bd93f9
green = #50fa7b
red = #ff5555
yellow = #f1fa8c
cyan = #8be9fd
active-bg = #44475a
urgent = #ff5555

[bar/main]
width = 100%
; Base height at 96 DPI — scaled by set_dpi.sh
height = 54
background = ${colors.background}
foreground = ${colors.foreground}
; Base font at 96 DPI — scaled by set_dpi.sh
font-0 = Noto Sans:size=18;5
padding-right = 2
module-margin = 1
modules-left = i3
modules-right = cpu load memory filesystem date keys
separator = |
separator-foreground = #999999
cursor-click = pointer
enable-ipc = true
bottom = true
wm-restack = i3
tray-position = right

[module/i3]
type = internal/i3
pin-workspaces = true
enable-scroll = true
wrapping-scroll = false
label-focused = %name%
label-focused-foreground = ${colors.foreground}
label-focused-background = ${colors.active-bg}
label-focused-underline = ${colors.primary}
label-focused-padding = 2
label-unfocused = %name%
label-unfocused-foreground = #bbbbbb
label-unfocused-padding = 2
label-urgent = %name%
label-urgent-foreground = ${colors.urgent}
label-urgent-underline = ${colors.urgent}
label-urgent-padding = 2

[module/cpu]
type = internal/cpu
interval = 5
format-prefix = "C"
format-prefix-foreground = ${colors.cyan}
label = %percentage%%

[module/load]
type = custom/script
exec = awk -v cpus=$(nproc) '{printf "%d%%", $1*100/cpus}' /proc/loadavg
interval = 5
format-prefix = "L"
format-prefix-foreground = ${colors.cyan}

[module/memory]
type = custom/script
exec = awk '/MemTotal/{t=$2} /MemAvailable/{a=$2} END{printf "%d%%", a*100/t}' /proc/meminfo
interval = 5
format-prefix = "M"
format-prefix-foreground = ${colors.cyan}

[module/filesystem]
type = internal/fs
mount-0 = /
interval = 60
format-mounted-prefix = "D"
format-mounted-prefix-foreground = ${colors.cyan}
label-mounted = %percentage_used%%

[module/date]
type = custom/script
exec = date '+%-m/%-d %-l:%M%P'
interval = 5
format-foreground = ${colors.green}

[module/keys]
type = custom/text
content = ?
content-foreground = ${colors.primary}
click-left = ~/scripts/show-keybindings.sh &
